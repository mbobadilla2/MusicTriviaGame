services:
  - type: web
    name: music-trivia-proxy
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: ALLOWED_ORIGIN
        sync: false   # Set this manually in Render dashboard to your GitHub Pages URL
    autoDeploy: true
